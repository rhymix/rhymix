<div class="x_page-header">
	<h1>{$lang->counter} {$lang->cmd_management}</h1>
</div>

<ul class="x_nav x_nav-tabs">
	<li class="x_active"><a href="{getUrl(['module' => 'admin', 'act' => 'dispCounterAdminConfig'])}">{$lang->cmd_setup}</a></li>
	<li loop="$lang->cmd_select_counter_type => $key, $val">
		<a href="{getUrl(['module' => 'admin', 'act' => 'dispCounterAdminIndex', 'type' => $key])}">{$val}</a>
	</li>
</ul>

<form ruleset="insertConfig" action="./" method="post" class="x_form-horizontal">
	<input type="hidden" name="module" value="counter" />
	<input type="hidden" name="act" value="procCounterAdminInsertConfig" />
	<input type="hidden" name="xe_validator_id" value="modules/counter/tpl/config/1" />

	<div cond="$XE_VALIDATOR_MESSAGE && $XE_VALIDATOR_ID == 'modules/counter/tpl/config/1'" class="message {$XE_VALIDATOR_MESSAGE_TYPE}">
		<p>{$XE_VALIDATOR_MESSAGE}</p>
	</div>

	<div class="x_control-group">
		<label class="x_control-label">{$lang->counter_is_enabled}</label>
		<div class="x_controls">
			<label class="x_inline"><input type="radio" name="is_enabled" value="Y" checked="checked"|cond="$config->is_enabled === 'Y'" /> {$lang->cmd_yes}</label>
			<label class="x_inline"><input type="radio" name="is_enabled" value="N" checked="checked"|cond="$config->is_enabled !== 'Y'" /> {$lang->cmd_no}</label>
			<p class="x_help-block">{$lang->about_counter_is_enabled}</p>
		</div>
	</div>
	<div class="x_clearfix btnArea">
		<div class="x_pull-right">
			<button type="submit" class="x_btn x_btn-primary">{$lang->cmd_save}</button>
		</div>
	</div>
</form>
